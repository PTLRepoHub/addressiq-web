name: Release

# Publishes @addressiq/iqcollect-web to npm. Push a tag `vX.Y.Z` to release at
# that version, or run manually (dry-run by default).
#
# Required secret: NPM_TOKEN (npm automation token).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate packaging, publish nothing)"
        type: boolean
        default: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # GOOGLE_MAPS_SDK_KEY is an environment-scoped secret (see cdn.yml). The npm
    # package is a production artifact, so this job must bind to `production` or
    # the key would resolve to an empty string and ship a widget whose Maps
    # autocomplete silently does nothing.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - name: Build (bakes the per-environment URLs + Maps key from GH env into the bundle)
        env:
          # Three URLs x two shippable environments. `development` is not baked —
          # it points at the developer's machine (see src/buildConfig.ts).
          STAGING_ADDRESSIQ_API_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_API_BASE_URL }}
          STAGING_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_BASE_URL }}
          STAGING_ADDRESSIQ_CDN_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_BASE_URL }}
          PROD_ADDRESSIQ_API_BASE_URL: ${{ vars.PROD_ADDRESSIQ_API_BASE_URL }}
          PROD_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_BASE_URL }}
          PROD_ADDRESSIQ_CDN_BASE_URL: ${{ vars.PROD_ADDRESSIQ_CDN_BASE_URL }}
          GOOGLE_MAPS_SDK_KEY: ${{ secrets.GOOGLE_MAPS_SDK_KEY }}
        run: npm run build

      # A missing build secret produces a VALID build with an empty key — nothing
      # fails, nothing warns. npm v0.5.0 shipped exactly that. Assert on the BYTES.
      - name: Verify the baked config (Maps key present, no placeholders)
        run: npm run check-config
      - run: npm test
      - name: Set version from tag + publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DRY="false"
          else
            VERSION="$(node -p "require('./package.json').version")"
            DRY="${{ github.event.inputs.dry_run }}"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if [ "$DRY" = "true" ]; then
            npm publish --access public --no-workspaces --dry-run
          else
            npm publish --access public
          fi
