name: Release

# Publishes @addressiq/iqcollect-web to npm. Push a tag `vX.Y.Z` to release at
# that version, or run manually (dry-run by default).
#
# Required secret: NPM_TOKEN (npm automation token).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate packaging, publish nothing)"
        type: boolean
        default: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - name: Build (bakes the per-environment URLs + Maps key from GH env into the bundle)
        env:
          # Three URLs x two shippable environments. `development` is not baked —
          # it points at the developer's machine (see src/buildConfig.ts).
          STAGING_ADDRESSIQ_API_URL: ${{ vars.STAGING_ADDRESSIQ_API_URL }}
          STAGING_ADDRESSIQ_INGEST_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_URL }}
          STAGING_ADDRESSIQ_CDN_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_URL }}
          PROD_ADDRESSIQ_API_URL: ${{ vars.PROD_ADDRESSIQ_API_URL }}
          PROD_ADDRESSIQ_INGEST_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_URL }}
          PROD_ADDRESSIQ_CDN_URL: ${{ vars.PROD_ADDRESSIQ_CDN_URL }}
          GOOGLE_MAPS_SDK_KEY: ${{ secrets.GOOGLE_MAPS_SDK_KEY }}
        run: npm run build
      - run: npm test
      - name: Set version from tag + publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DRY="false"
          else
            VERSION="$(node -p "require('./package.json').version")"
            DRY="${{ github.event.inputs.dry_run }}"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if [ "$DRY" = "true" ]; then
            npm publish --access public --no-workspaces --dry-run
          else
            npm publish --access public
          fi
