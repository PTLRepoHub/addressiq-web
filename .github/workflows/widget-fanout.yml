name: widget-fanout

# `dist/iqcollect.js` is vendored into four SDK repos. Nothing kept them in
# sync — a web release could change the widget and propagate to zero SDKs,
# silently. This mirrors AddressIq-proto/fanout.yml for the widget bundle.
#
# On a web release: compute the version + SRI hash, then open a pin-bump PR in
# each SDK writing .widget-version / .widget-integrity. The SDKs load the widget
# from the CDN and vendor no copy, so there is nothing to re-vendor — only the pin.
#
# Cross-repo writes need a GitHub App token; the default GITHUB_TOKEN is scoped
# to this repo only. Same App as release-please (see release-please.yml).
#
# The token is minted per matrix leg and narrowed to that one consumer repo
# (`repositories: ${{ matrix.repo }}`), so a leg that writes to addressiq-ios
# holds no credential for addressiq-android.
#
# Required secrets: ADDRESSIQ_BOT_APP_ID, ADDRESSIQ_BOT_PRIVATE_KEY

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and diff, but open no PRs"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build widget bundle
    runs-on: ubuntu-latest
    # GOOGLE_MAPS_SDK_KEY is an environment-scoped secret (see cdn.yml). The
    # bundle vendored into the four SDKs is a production artifact, so this job
    # must bind to `production` — otherwise the key resolves to an empty string
    # and every SDK would ship a widget whose Maps autocomplete silently does
    # nothing.
    #
    # It also keeps this bundle byte-identical to the one cdn.yml uploads on the
    # same release event, which is what makes the SRI hash written to
    # `.widget-integrity` below actually match the bytes served by the CDN.
    environment: production
    outputs:
      version: ${{ steps.v.outputs.version }}
      integrity: ${{ steps.v.outputs.integrity }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Build (bakes the per-environment URLs + Maps key into the fanned-out bundle)
        env:
          # Identical to release.yml and cdn.yml, so the vendored widget, the npm
          # bundle and the CDN bundle are baked from the same values.
          STAGING_ADDRESSIQ_API_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_API_BASE_URL }}
          STAGING_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_BASE_URL }}
          STAGING_ADDRESSIQ_CDN_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_BASE_URL }}
          PROD_ADDRESSIQ_API_BASE_URL: ${{ vars.PROD_ADDRESSIQ_API_BASE_URL }}
          PROD_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_BASE_URL }}
          PROD_ADDRESSIQ_CDN_BASE_URL: ${{ vars.PROD_ADDRESSIQ_CDN_BASE_URL }}
          GOOGLE_MAPS_SDK_KEY: ${{ secrets.GOOGLE_MAPS_SDK_KEY }}
        run: npm run build

      # A missing build secret produces a VALID build with an empty key — nothing
      # fails, nothing warns. npm v0.5.0 shipped exactly that. Assert on the BYTES.
      - name: Verify the baked config (Maps key present, no placeholders)
        run: npm run check-config
      # The SRI hash the SDKs pin their <script integrity="…"> against. Generated
      # from the SAME dist/ that is vendored and that cdn.yml uploads, so the
      # bytes on the CDN, the bytes in the SDK bundle, and this hash cannot
      # disagree — all three come from one build.
      - name: Generate MANIFEST.json (SRI hashes)
        run: npm run manifest

      - name: Resolve version + integrity
        id: v
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./package.json').version")"
          fi
          INTEGRITY="$(node -p "
            require('./dist/MANIFEST.json').artifacts.find(a => a.file === 'iqcollect.js').integrity
          ")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "integrity=$INTEGRITY" >> "$GITHUB_OUTPUT"
          echo "v$V  $INTEGRITY"

      # NOTE: the bundle is NOT vendored into the SDKs any more — they load the
      # SRI-pinned copy from the CDN at runtime (cdn.yml uploads it). So this job
      # no longer uploads the bundle as an artifact, and the second, key-free build
      # that pub.dev required (it rejects a Google API key in a vendored asset) is
      # gone entirely. All this job produces now is the version + integrity above,
      # which the fanout writes into each SDK as the pin.

  fanout:
    name: ${{ matrix.repo }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The SDKs no longer vendor the bundle — they load the SRI-pinned copy from
        # the CDN. So a leg only writes the PIN (.widget-version / .widget-integrity)
        # into each repo; there is no per-repo `dest` asset and no artifact.
        repo:
          - addressiq-ios
          - addressiq-flutter
          - addressiq-android
          - addressiq-react-native

    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADDRESSIQ_BOT_APP_ID }}
          private-key: ${{ secrets.ADDRESSIQ_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repo }}

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Write widget pin
        env:
          VERSION: ${{ needs.build.outputs.version }}
          INTEGRITY: ${{ needs.build.outputs.integrity }}
        run: |
          set -euo pipefail
          printf 'v%s\n' "$VERSION" > .widget-version
          # The SDKs bake these two into their build config and use them to load
          # https://{cdn}/v{VERSION}/iqcollect.js with <script integrity="…">. This
          # is the ONLY widget source — the SDKs ship no bundled copy — so the pin
          # must describe exactly the bytes cdn.yml uploaded from the same build. A
          # separate CI check in each SDK verifies the pin resolves a loadable URL.
          printf '%s\n' "$INTEGRITY" > .widget-integrity

      - name: Anything to do?
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.repo }} already pins this widget build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat
          fi

      - name: Open widget-pin PR
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: widget/v${{ needs.build.outputs.version }}
          base: main
          commit-message: "chore(widget): bump CDN widget pin to web v${{ needs.build.outputs.version }}"
          title: "chore(widget): bump CDN widget pin to web v${{ needs.build.outputs.version }}"
          body: |
            Bumps `.widget-version` / `.widget-integrity` to
            [`@addressiq/iqcollect-web` v${{ needs.build.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}).

            The SDK loads the widget from the SRI-pinned CDN copy at runtime and ships
            no bundled bundle, so this pin is the only thing to update.

            Generated by `widget-fanout.yml` in `${{ github.repository }}`.
          labels: widget-sync
          delete-branch: true
