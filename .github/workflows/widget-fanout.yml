name: widget-fanout

# `dist/iqcollect.js` is vendored into four SDK repos. Nothing kept them in
# sync — a web release could change the widget and propagate to zero SDKs,
# silently. This mirrors AddressIq-proto/fanout.yml for the widget bundle.
#
# On a web release: build the bundle once, then open a re-vendor PR in each
# consumer. The PR lands as `feat(widget):` so release-please cuts a minor.
#
# Cross-repo writes need a GitHub App token; the default GITHUB_TOKEN is scoped
# to this repo only. Same App as release-please (see release-please.yml).
#
# The token is minted per matrix leg and narrowed to that one consumer repo
# (`repositories: ${{ matrix.repo }}`), so a leg that writes to addressiq-ios
# holds no credential for addressiq-android.
#
# Required secrets: ADDRESSIQ_BOT_APP_ID, ADDRESSIQ_BOT_PRIVATE_KEY

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and diff, but open no PRs"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build widget bundle
    runs-on: ubuntu-latest
    # GOOGLE_MAPS_SDK_KEY is an environment-scoped secret (see cdn.yml). The
    # bundle vendored into the four SDKs is a production artifact, so this job
    # must bind to `production` — otherwise the key resolves to an empty string
    # and every SDK would ship a widget whose Maps autocomplete silently does
    # nothing.
    #
    # It also keeps this bundle byte-identical to the one cdn.yml uploads on the
    # same release event, which is what makes the SRI hash written to
    # `.widget-integrity` below actually match the bytes served by the CDN.
    environment: production
    outputs:
      version: ${{ steps.v.outputs.version }}
      integrity: ${{ steps.v.outputs.integrity }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Build (bakes the per-environment URLs + Maps key into the fanned-out bundle)
        env:
          # Identical to release.yml and cdn.yml, so the vendored widget, the npm
          # bundle and the CDN bundle are baked from the same values.
          STAGING_ADDRESSIQ_API_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_API_BASE_URL }}
          STAGING_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_BASE_URL }}
          STAGING_ADDRESSIQ_CDN_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_BASE_URL }}
          PROD_ADDRESSIQ_API_BASE_URL: ${{ vars.PROD_ADDRESSIQ_API_BASE_URL }}
          PROD_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_BASE_URL }}
          PROD_ADDRESSIQ_CDN_BASE_URL: ${{ vars.PROD_ADDRESSIQ_CDN_BASE_URL }}
          GOOGLE_MAPS_SDK_KEY: ${{ secrets.GOOGLE_MAPS_SDK_KEY }}
        run: npm run build

      # A missing build secret produces a VALID build with an empty key — nothing
      # fails, nothing warns. npm v0.5.0 shipped exactly that. Assert on the BYTES.
      - name: Verify the baked config (Maps key present, no placeholders)
        run: npm run check-config
      # The SRI hash the SDKs pin their <script integrity="…"> against. Generated
      # from the SAME dist/ that is vendored and that cdn.yml uploads, so the
      # bytes on the CDN, the bytes in the SDK bundle, and this hash cannot
      # disagree — all three come from one build.
      - name: Generate MANIFEST.json (SRI hashes)
        run: npm run manifest

      - name: Resolve version + integrity
        id: v
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./package.json').version")"
          fi
          INTEGRITY="$(node -p "
            require('./dist/MANIFEST.json').artifacts.find(a => a.file === 'iqcollect.js').integrity
          ")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "integrity=$INTEGRITY" >> "$GITHUB_OUTPUT"
          echo "v$V  $INTEGRITY"
      - uses: actions/upload-artifact@v4
        with:
          name: iqcollect
          path: dist/iqcollect.js
          if-no-files-found: error

      # A SECOND, key-free build — for pub.dev only.
      #
      # pub.dev scans packages for credentials and REFUSES to publish one that
      # contains a Google API key ("Potential leak of Google API Key in
      # assets/iqcollect.js"). It is right to: the Flutter package is public.
      #
      # This costs nothing, because the vendored bundle is only the *fallback*.
      # The SRI pin (`.widget-integrity`) hashes the bytes on the CDN, NOT this
      # file — so Flutter still fetches and integrity-checks the keyed CDN bundle
      # exactly like the other SDKs. The keyless copy is used only when the CDN is
      # unreachable, and in that path the Maps key comes from the backend's
      # /widget/config anyway, which takes priority over the baked one
      # (addressiq-web/src/flow.ts:111).
      - name: Build a key-free bundle for pub.dev (Flutter)
        env:
          STAGING_ADDRESSIQ_API_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_API_BASE_URL }}
          STAGING_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_BASE_URL }}
          STAGING_ADDRESSIQ_CDN_BASE_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_BASE_URL }}
          PROD_ADDRESSIQ_API_BASE_URL: ${{ vars.PROD_ADDRESSIQ_API_BASE_URL }}
          PROD_ADDRESSIQ_INGEST_BASE_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_BASE_URL }}
          PROD_ADDRESSIQ_CDN_BASE_URL: ${{ vars.PROD_ADDRESSIQ_CDN_BASE_URL }}
          # deliberately NOT passing GOOGLE_MAPS_SDK_KEY
        run: |
          set -euo pipefail
          npm run build
          # The guard must now REFUSE to find a key — assert the strip worked.
          node scripts/check-baked-config.mjs --allow-empty-maps-key
          if grep -qoE 'AIzaSy[A-Za-z0-9_-]{10}' dist/iqcollect.js; then
            echo "::error::the key-free bundle still contains a Google API key — pub.dev will reject it" >&2
            exit 1
          fi
          mkdir -p /tmp/nokey && cp dist/iqcollect.js /tmp/nokey/iqcollect.js
          echo "key-free bundle OK ($(wc -c < /tmp/nokey/iqcollect.js) bytes)"

      - uses: actions/upload-artifact@v4
        with:
          name: iqcollect-nokey
          path: /tmp/nokey/iqcollect.js
          if-no-files-found: error

  fanout:
    name: ${{ matrix.repo }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: addressiq-ios
            dest: Sources/AddressIQ/Resources/iqcollect.js
            artifact: iqcollect
          # pub.dev refuses to publish a package containing a Google API key, so
          # Flutter vendors the KEY-FREE build. Harmless: the vendored bundle is
          # only the offline fallback — the SRI pin hashes the CDN bytes, so
          # Flutter still fetches and verifies the keyed CDN bundle like everyone
          # else, and in the fallback path the key comes from /widget/config.
          - repo: addressiq-flutter
            dest: assets/iqcollect.js
            artifact: iqcollect-nokey
          - repo: addressiq-android
            dest: src/main/assets/iqcollect.js
            artifact: iqcollect
          # RN embeds the bundle as a TS string literal rather than an asset.
          - repo: addressiq-react-native
            dest: src/ui/widgetBundle.ts
            artifact: iqcollect

    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADDRESSIQ_BOT_APP_ID }}
          private-key: ${{ secrets.ADDRESSIQ_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repo }}

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/widget

      - name: Re-vendor
        env:
          DEST: ${{ matrix.dest }}
          VERSION: ${{ needs.build.outputs.version }}
          INTEGRITY: ${{ needs.build.outputs.integrity }}
        run: |
          set -euo pipefail
          test -f "$DEST" || { echo "::error::$DEST missing in ${{ matrix.repo }}" >&2; exit 1; }
          case "$DEST" in
            *.ts)
              # Regenerate the TS module; the string must be an exact JSON
              # encoding of the bundle, matching the existing header.
              node -e '
                const fs = require("fs");
                const js = fs.readFileSync("/tmp/widget/iqcollect.js", "utf8");
                const out =
                  "/* AUTO-GENERATED from @addressiq/iqcollect-web dist/iqcollect.js — do not edit. */\n" +
                  "/* eslint-disable */\n" +
                  "export const WIDGET_JS: string = " + JSON.stringify(js) + ";\n";
                fs.writeFileSync(process.env.DEST, out);
              '
              ;;
            *) cp /tmp/widget/iqcollect.js "$DEST" ;;
          esac
          printf 'v%s\n' "$VERSION" > .widget-version
          # The SDKs bake these two into their build config and use them to load
          # https://{cdn}/v{VERSION}/iqcollect.js with <script integrity="…">.
          # Both describe the SAME bytes just vendored above, so the CDN copy and
          # the bundled fallback are byte-identical by construction — and an SRI
          # mismatch at runtime means the CDN was tampered with, not that the two
          # drifted apart.
          printf '%s\n' "$INTEGRITY" > .widget-integrity

      - name: Anything to do?
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.repo }} already carries this widget build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat
          fi

      - name: Open re-vendor PR
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: widget/v${{ needs.build.outputs.version }}
          base: main
          commit-message: "feat(widget): re-vendor iqcollect.js from web v${{ needs.build.outputs.version }}"
          title: "feat(widget): re-vendor iqcollect.js from web v${{ needs.build.outputs.version }}"
          body: |
            Re-vendors `${{ matrix.dest }}` from
            [`@addressiq/iqcollect-web` v${{ needs.build.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}).

            `.widget-version` updated to `v${{ needs.build.outputs.version }}`.

            Generated by `widget-fanout.yml` in `${{ github.repository }}`.
          labels: widget-sync
          delete-branch: true
