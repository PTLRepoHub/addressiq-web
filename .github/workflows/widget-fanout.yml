name: widget-fanout

# `dist/iqcollect.js` is vendored into four SDK repos. Nothing kept them in
# sync — a web release could change the widget and propagate to zero SDKs,
# silently. This mirrors AddressIq-proto/fanout.yml for the widget bundle.
#
# On a web release: build the bundle once, then open a re-vendor PR in each
# consumer. The PR lands as `feat(widget):` so release-please cuts a minor.
#
# Cross-repo writes need a GitHub App token; the default GITHUB_TOKEN is scoped
# to this repo only. Same App as release-please (see release-please.yml).
#
# The token is minted per matrix leg and narrowed to that one consumer repo
# (`repositories: ${{ matrix.repo }}`), so a leg that writes to addressiq-ios
# holds no credential for addressiq-android.
#
# Required secrets: ADDRESSIQ_BOT_APP_ID, ADDRESSIQ_BOT_PRIVATE_KEY

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and diff, but open no PRs"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build widget bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Build (bakes the per-environment URLs + Maps key into the fanned-out bundle)
        env:
          # Identical to release.yml and cdn.yml, so the vendored widget, the npm
          # bundle and the CDN bundle are baked from the same values.
          STAGING_ADDRESSIQ_API_URL: ${{ vars.STAGING_ADDRESSIQ_API_URL }}
          STAGING_ADDRESSIQ_INGEST_URL: ${{ vars.STAGING_ADDRESSIQ_INGEST_URL }}
          STAGING_ADDRESSIQ_CDN_URL: ${{ vars.STAGING_ADDRESSIQ_CDN_URL }}
          PROD_ADDRESSIQ_API_URL: ${{ vars.PROD_ADDRESSIQ_API_URL }}
          PROD_ADDRESSIQ_INGEST_URL: ${{ vars.PROD_ADDRESSIQ_INGEST_URL }}
          PROD_ADDRESSIQ_CDN_URL: ${{ vars.PROD_ADDRESSIQ_CDN_URL }}
          GOOGLE_MAPS_SDK_KEY: ${{ secrets.GOOGLE_MAPS_SDK_KEY }}
        run: npm run build
      - name: Resolve version
        id: v
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./package.json').version")"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: iqcollect
          path: dist/iqcollect.js
          if-no-files-found: error

  fanout:
    name: ${{ matrix.repo }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: addressiq-ios
            dest: Sources/AddressIQ/Resources/iqcollect.js
          - repo: addressiq-flutter
            dest: assets/iqcollect.js
          - repo: addressiq-android
            dest: src/main/assets/iqcollect.js
          # RN embeds the bundle as a TS string literal rather than an asset.
          - repo: addressiq-react-native
            dest: src/ui/widgetBundle.ts

    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADDRESSIQ_BOT_APP_ID }}
          private-key: ${{ secrets.ADDRESSIQ_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repo }}

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: iqcollect
          path: /tmp/widget

      - name: Re-vendor
        env:
          DEST: ${{ matrix.dest }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          test -f "$DEST" || { echo "::error::$DEST missing in ${{ matrix.repo }}" >&2; exit 1; }
          case "$DEST" in
            *.ts)
              # Regenerate the TS module; the string must be an exact JSON
              # encoding of the bundle, matching the existing header.
              node -e '
                const fs = require("fs");
                const js = fs.readFileSync("/tmp/widget/iqcollect.js", "utf8");
                const out =
                  "/* AUTO-GENERATED from @addressiq/iqcollect-web dist/iqcollect.js — do not edit. */\n" +
                  "/* eslint-disable */\n" +
                  "export const WIDGET_JS: string = " + JSON.stringify(js) + ";\n";
                fs.writeFileSync(process.env.DEST, out);
              '
              ;;
            *) cp /tmp/widget/iqcollect.js "$DEST" ;;
          esac
          printf 'v%s\n' "$VERSION" > .widget-version

      - name: Anything to do?
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.repo }} already carries this widget build."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat
          fi

      - name: Open re-vendor PR
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: widget/v${{ needs.build.outputs.version }}
          base: main
          commit-message: "feat(widget): re-vendor iqcollect.js from web v${{ needs.build.outputs.version }}"
          title: "feat(widget): re-vendor iqcollect.js from web v${{ needs.build.outputs.version }}"
          body: |
            Re-vendors `${{ matrix.dest }}` from
            [`@addressiq/iqcollect-web` v${{ needs.build.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}).

            `.widget-version` updated to `v${{ needs.build.outputs.version }}`.

            Generated by `widget-fanout.yml` in `${{ github.repository }}`.
          labels: widget-sync
          delete-branch: true
